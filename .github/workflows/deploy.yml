name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  TORAHDL_API_FUNCTIONAPP_NAME: ${{ vars.TORAHDL_API_FUNCTIONAPP_NAME }}
  DOTNET_VERSION: '10.0.x'
  PYTHON_VERSION: '3.12'
  FUNCTION_PROJECT_PATH: 'src/JoelRichPodcast.Functions'
  TORAHDL_API_PATH: 'src/TorahDlApi'

jobs:
  deploy-torahdl-api:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          cd ${{ env.TORAHDL_API_PATH }}
          pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Torah-dl API
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.TORAHDL_API_FUNCTIONAPP_NAME }}
          package: ${{ env.TORAHDL_API_PATH }}

  deploy-dotnet:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-torahdl-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build .NET
        run: |
          dotnet build ${{ env.FUNCTION_PROJECT_PATH }} --configuration Release --output ./output

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
